<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Your Face</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="scan-container">
    <h1>Scan Your Face</h1>
    <p>Upload a selfie or use your camera.</p>

    <div class="upload-box">
      <input type="file" accept="image/*" capture="user" id="faceUpload">
    </div>

    <a href="looks.html" class="continue-btn">Continue</a>
  </div>
</body>
  
<div class="scan-step">
  <h1>Face Forward</h1>
  <p>Hold your head straight and look directly at the camera.</p>

  <label for="upload" class="camera-btn">📸</label>
  <input type="file" accept="image/*" capture="user" id="upload" style="display:none;">

  <a href="scan-left.html" class="next-btn">Next</a>
</div>
 
</body>
</html>
